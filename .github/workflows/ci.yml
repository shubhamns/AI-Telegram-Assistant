name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test -- --run
        env:
          VITE_API_URL: http://127.0.0.1:5000/api/v1
      - run: npm run build
        env:
          VITE_API_URL: http://127.0.0.1:5000/api/v1

  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test -- --run
      - run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    steps:
      - uses: actions/checkout@v4
      - name: Build frontend Docker image
        run: docker build -t ai-telegram-assistant-frontend --build-arg VITE_API_URL=http://127.0.0.1:5000/api/v1 ./frontend
      - name: Build backend Docker image
        run: docker build -t ai-telegram-assistant-backend ./backend
